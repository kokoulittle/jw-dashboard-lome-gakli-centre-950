<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JW Dashboard – Préposés à l'Accueil</title>
    <link rel="stylesheet" href="web/styles.css" />
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js" defer></script>
    <script src="web/app.js" defer></script>
  </head>
  <body>
    <header class="header">
      <img src="assets/JW_Logo.png" alt="JW logo" class="logo" />
      <h1 id="dashboard-title">Tableau de Bord des Préposés à l’Accueil</h1>
    </header>

    <main class="main-content">
      <section class="controls">
        <label for="week-selector">Semaine :</label>
        <select id="week-selector" disabled></select>
        <button id="export-pdf" disabled>Exporter en PDF</button>
        <span id="status" role="status" aria-live="polite">Chargement des données…</span>
      </section>

      <section>
        <div id="week-table"></div>
      </section>
    </main>
  </body>
</html>
